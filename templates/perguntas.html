<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Perguntas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Quiz de Perguntas</h1>

    <div id="statusQuiz">
        <p>Questão <span id="numeroPergunta">0</span> / <span id="totalPerguntas">0</span></p>
        <p>Pontuação: <span id="pontuacao">0</span></p>
    </div>

    <div id="perguntaContainer">
        <h2 id="textoPergunta">Carregando a pergunta...</h2>
        <div id="opcoesContainer" class="opcoes-container">
            <button id="btnOpcao0" class="opcao-btn">Opção 1</button>
            <button id="btnOpcao1" class="opcao-btn">Opção 2</button>
            <button id="btnOpcao2" class="opcao-btn">Opção 3</button>
            <button id="btnOpcao3" class="opcao-btn">Opção 4</button>
        </div>
    </div>

    <div id="resultadoFinal" style="display: none; margin-top: 1rem;"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
