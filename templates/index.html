<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="header-bar">
            <div>
                <h1>Quiz</h1>
            </div>
            <div class="input-top-right">
                <input type="text" id="inputNome" placeholder="Seu nome">
            </div>
        </header>

        <main class="content-card">
            <div class="card-inner centered">
                <div class="button-group">
                    <button id="Sala" onclick="criarSala()">Criar Sala</button>
                    <button class="secondary" onclick="entrarSala()">Entrar</button>
                </div>
            </div>
        </main>

        <button class="help-button" onclick="abrirSlides()"><strong>?</strong></button>

        <div id="container-slides" class="oculto">
            <div class="caixa-slide">
                <img id="imagem-atual" src="" alt="Tutorial">
                <div class="controles">
                    <button id="btn-voltar" onclick="mudarSlide(-1)">Voltar</button>
                    <button id="btn-proximo" onclick="mudarSlide(1)">Próximo</button>
                    <button id="btn-fechar" class="oculto" onclick="fecharSlides()">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='index.js') }}"></script>
    <script src="static/quiz.js"></script>
</body>
</html>
